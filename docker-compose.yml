services:
  backend1: 
    build:
      context: ./backend
    container_name: backend-1
    ports:
      - "3003:3003"
    environment:
      REDIS_URL: redis://redis:6379
  backend2:
    build:
      context: ./backend
    container_name: backend-2
    ports:
      - "3004:3003"
    environment:
      - REDIS_URL= redis://redis:6379
  redis: 
    image: redis:latest
    container_name: redis-server-comp
    ports: 
      - "6379:6379"