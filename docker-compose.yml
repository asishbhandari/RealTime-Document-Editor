services:
  backend: 
    build:
      context: ./RTDocEditior
    container_name: rtdoc-backend-container-comp
    ports:
      - "3003:3003"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
  redis: 
    image: redis:latest
    container_name: redis-server-comp
    ports: 
      - "6379:6379"