services:
  backend1: 
    build:
      context: ./backend
    container_name: backend-1
    ports:
      - "3003:3003"
    environment:
      REDIS_URL: redis://redis:6379
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - /app/node_modules
  backend2:
    build:
      context: ./backend
    container_name: backend-2
    ports:
      - "3004:3003"
    environment:
      REDIS_URL: redis://redis:6379
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - /app/node_modules
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend1
  redis: 
    image: redis:latest
    container_name: redis-server-comp
    ports: 
      - "6379:6379"